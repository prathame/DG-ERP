databases:
  - name: dg-erp-db
    plan: free
    databaseName: dg_erp
    user: dg_erp_user

services:
  - type: web
    name: dg-erp
    plan: free
    runtime: node
    buildCommand: npm install && npm run build:prod
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dg-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      # Set these manually in Render Dashboard → Environment:
      # SUPER_ADMIN_EMAIL=your-email@domain.com
      # SUPER_ADMIN_PASSWORD=your-secure-password
