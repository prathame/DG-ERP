databases:
  - name: dg-erp-db
    plan: free
    databaseName: dg_erp
    user: dg_erp_user

services:
  - type: web
    name: dg-erp
    plan: free
    runtime: node
    buildCommand: npm ci && npm test && npm run build:prod
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dg-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOGTAIL_TOKEN
        sync: false
      - key: PUBLIC_APP_URL
        value: https://dhandho.app
