databases:
  - name: dg-erp-db
    plan: free
    databaseName: dg_erp
    user: dg_erp_user

services:
  - type: web
    name: dg-erp
    plan: free
    runtime: node
    buildCommand: npm install && npm run build:prod
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dg-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      # REQUIRED — set in Render Dashboard → Environment before go-live:
      # SUPER_ADMIN_EMAIL=your-email@domain.com
      # SUPER_ADMIN_PASSWORD=your-secure-password-min-12-chars
      # ALLOWED_ORIGINS=https://dhandho.app,https://dg-erp.onrender.com
      # LOGTAIL_TOKEN=your-logtail-source-token (from betterstack.com)
