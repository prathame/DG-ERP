# Web on Render; database is external (Neon recommended — or any Postgres via DATABASE_URL).
# Do NOT provision Render Postgres here — stale dpg-* hosts cause ENOTFOUND at boot.

services:
  - type: web
    # Subdomain is fixed at create time → https://dhandho.onrender.com
    # Render cannot rename *.onrender.com after create. Live service is still dg-erp.onrender.com;
    # create a new Blueprint/service named `dhandho` (copy env from dg-erp), then retire dg-erp.
    # See engineering-academy/docs/deployment/render.md → "Hostname cutover".
    name: dhandho
    # Launch: upgrade off free for production SLA (sleep on free).
    plan: free
    runtime: node
    # Do NOT run `npm test` here: tests must not hit the production DB (CI runs them).
    # --include=dev: NODE_ENV=production would otherwise omit build tools
    # (tailwindcss, etc.) even when vite plugins are in dependencies.
    buildCommand: npm ci --include=dev && npm run build:prod
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Paste Neon (or any Postgres) URI in Render Dashboard — not fromDatabase
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Skip git hooks install on Render (husky is a local-dev tool)
      - key: HUSKY
        value: "0"
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      # Neon / managed PaaS TLS — Node often needs this; safe for Neon/Render/Supabase hosts only
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # Set these in Render Dashboard → Environment (sync: false = not auto-filled):
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOGTAIL_TOKEN
        sync: false
      - key: SECRETS_ENCRYPTION_KEY
        sync: false
      # Canonical product domain later: https://dhandho.app (DNS not live yet)
      - key: PUBLIC_APP_URL
        value: https://dhandho.onrender.com
