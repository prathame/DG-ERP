databases:
  - name: dg-erp-db
    plan: free
    databaseName: dg_erp
    user: dg_erp_user

services:
  - type: web
    name: dg-erp
    plan: free
    runtime: node
    # Do NOT run `npm test` here: tests must not hit the production DB (CI runs them).
    # --include=dev: NODE_ENV=production would otherwise omit build tools
    # (tailwindcss, etc.) even when vite plugins are in dependencies.
    buildCommand: npm ci --include=dev && npm run build:prod
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dg-erp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Skip git hooks install on Render (husky is a local-dev tool)
      - key: HUSKY
        value: "0"
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      # Set these in Render Dashboard → Environment (sync: false = not auto-filled):
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: LOGTAIL_TOKEN
        sync: false
      - key: PUBLIC_APP_URL
        value: https://dhandho.app
