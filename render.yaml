# Web on Render; database is external (Neon recommended — or any Postgres via DATABASE_URL).
# Do NOT provision Render Postgres here — stale dpg-* hosts cause ENOTFOUND at boot.
# No `databases:` / `fromDatabase` — paste Neon into DATABASE_URL in the Dashboard.

services:
  - type: web
    # Live service: https://dhandho-2kdx.onrender.com (srv-d9fmf3gk1i2s73b4flgg).
    # Render assigned the `-2kdx` suffix because plain `dhandho` was taken or the
    # service was created with that name. Subdomains are fixed at create time and
    # cannot be renamed — do not fight for `dhandho.onrender.com`; use this URL.
    # `name` must match the existing Dashboard service for Blueprint sync.
    name: dhandho-2kdx
    # Launch: upgrade off free for production SLA (sleep on free).
    plan: free
    runtime: node
    # Do NOT run `npm test` here: tests must not hit the production DB (CI runs them).
    # --include=dev: NODE_ENV=production would otherwise omit build tools
    # (tailwindcss, etc.) even when vite plugins are in dependencies.
    buildCommand: npm ci --include=dev && npm run build:prod
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      # Paste Neon (or any Postgres) URI in Render Dashboard — not fromDatabase
      - key: DATABASE_URL
        sync: false
      # Fresh Blueprint gets a random secret; for cutover from dg-erp, overwrite with the old JWT_SECRET
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      # Skip git hooks install on Render (husky is a local-dev tool)
      - key: HUSKY
        value: "0"
      - key: PORT
        value: 3001
      - key: DATABASE_SSL
        value: "true"
      # Neon / managed PaaS TLS — Node often needs this; safe for Neon/Render/Supabase hosts only
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      # Set these in Render Dashboard → Environment (sync: false = not auto-filled):
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      # Same-origin browser + hosted web. Extend in Dashboard for extra hosts / Cap allowlists if needed.
      - key: ALLOWED_ORIGINS
        value: https://dhandho-2kdx.onrender.com
      - key: LOGTAIL_TOKEN
        sync: false
      - key: SECRETS_ENCRYPTION_KEY
        sync: false
      # Canonical product domain later: https://dhandho.app (DNS not live yet)
      - key: PUBLIC_APP_URL
        value: https://dhandho-2kdx.onrender.com
