name: Build & Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Tests on main
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dhandho_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dhandho_test
      JWT_SECRET: test-jwt-secret-for-ci-only-not-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage

  build:
    name: Build + TypeScript + Bundle
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero errors
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Check build output + bundle size
        run: |
          if [ ! -d "dist" ]; then echo "Build failed — no dist"; exit 1; fi
          echo "Build succeeded"
          MAIN=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -n "$MAIN" ]; then
            SIZE=$(gzip -c "$MAIN" | wc -c)
            echo "Main chunk gzip: ${SIZE} bytes (limit: 262144)"
            [ "$SIZE" -gt 262144 ] && echo "Main chunk too large" && exit 1
            echo "Bundle size OK"
          fi

      - name: No dangerouslySetInnerHTML
        run: |
          COUNT=$(grep -rn "dangerouslySetInnerHTML" src/ --include="*.tsx" | wc -l)
          [ "$COUNT" -eq 0 ] && echo "Clean" || (echo "Found dangerouslySetInnerHTML"; exit 1)
