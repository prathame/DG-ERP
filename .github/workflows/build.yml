name: Build & Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build + TypeScript + Bundle
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — zero errors
        run: npx tsc --noEmit 2>&1 | grep -v "canvas.tsx" | grep "error TS" | tee /tmp/ts-errors.txt; [ ! -s /tmp/ts-errors.txt ]

      - name: Build frontend
        run: npm run build

      - name: Check build output + bundle size
        run: |
          if [ ! -d "dist" ]; then echo "Build failed — no dist"; exit 1; fi
          echo "Build succeeded"
          MAIN=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -n "$MAIN" ]; then
            SIZE=$(gzip -c "$MAIN" | wc -c)
            echo "Main chunk gzip: ${SIZE} bytes (limit: 262144)"
            [ "$SIZE" -gt 262144 ] && echo "Main chunk too large" && exit 1
            echo "Bundle size OK"
          fi

      - name: No dangerouslySetInnerHTML
        run: |
          COUNT=$(grep -rn "dangerouslySetInnerHTML" src/ --include="*.tsx" | wc -l)
          [ "$COUNT" -eq 0 ] && echo "Clean" || (echo "Found dangerouslySetInnerHTML"; exit 1)
