name: Build

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Production Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Check build output
        run: |
          if [ -d "dist" ]; then
            echo "Build successful"
            ls -lh dist/
          else
            echo "Build failed — no dist directory"
            exit 1
          fi
