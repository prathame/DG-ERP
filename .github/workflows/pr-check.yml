name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dhandho_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dhandho_test
      JWT_SECRET: test-jwt-secret-for-ci-only-not-production
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage
      # Coverage floors are enforced by vitest.config.ts thresholds (90% stmts/funcs/lines).

  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: No dangerouslySetInnerHTML
        run: |
          if grep -rn 'dangerouslySetInnerHTML' src/ --include='*.tsx' | grep -v 'node_modules'; then
            echo "FAIL: Remove dangerouslySetInnerHTML"
            exit 1
          fi

      - name: No hardcoded secrets
        run: |
          if [ -f ".env" ]; then echo "FAIL: .env committed"; exit 1; fi
          echo "Clean"

      - name: npm audit (critical only)
        run: npm audit --audit-level=critical

      - name: Bundle size check
        run: |
          SIZE=$(du -sk dist/assets/*.js | awk '{sum+=$1} END {print sum}')
          echo "Total JS bundle: ${SIZE}KB"
          if [ "$SIZE" -gt 2000 ]; then
            echo "WARNING: Bundle exceeds 2MB ($SIZE KB)"
          fi
