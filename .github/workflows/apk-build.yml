# Unified Dhandho Service phone — one Android APK + one iOS .app.zip.
# First launch: Online (cloud) or Offline (on-device) picker (one-time).
#
# Labels (merge → evergreen; label on open PR → preview):
#   mobile → Android + iOS
#
# Comment preview (does NOT overwrite evergreen):
#   apk build | /apk
#
# Evergreen release tag `dhandho-mobile`:
#   dhandho-mobile-debug.apk + dhandho-mobile-debug.app.zip
name: APK Build

on:
  pull_request:
    types: [closed, labeled]
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'ios/**'
      - 'capacitor.config.ts'
      - 'capacitor.cloud.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.env.service-mobile.example'
      - '.env.service-cloud.example'
      - '.env.service-phone.example'
      - 'scripts/cap-sync-cloud.sh'
      - 'scripts/ci-build-android.sh'
      - 'scripts/ci-build-ios.sh'
      - 'scripts/ci-upload-evergreen-asset.sh'
      - 'scripts/android-set-product.sh'
      - 'scripts/ios-set-product.sh'
      - 'src/platforms/service-mobile/**'
      - 'src/platforms/service-cloud/**'
      - 'src/App.tsx'
      - 'src/main.tsx'
      - 'src/index.css'
      - 'src/lib/billTemplates.ts'
      - 'src/lib/utils.ts'
      - 'src/lib/billSettingsFlags.ts'
      - 'src/features/invoices/**'
      - 'src/features/settings/SettingsView.tsx'
      - 'src/components/layout/LoginScreen.tsx'
      - 'src/components/ui/AppModal.tsx'
      - 'src/components/ui/ConfirmDialog.tsx'
      - 'src/components/ui/Toast.tsx'
      - 'src/components/ui/MobileShell.tsx'
      - '.github/workflows/apk-build.yml'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build (leave empty for main tip)'
        required: false
      product:
        description: 'Which APK(s) to build (unified phone — options are aliases)'
        type: choice
        options: [both, offline, online]
        default: both
      push_release:
        description: 'Upload matching evergreen release(s)'
        type: boolean
        default: true

concurrency:
  # Merged PR + push-to-main both fire for the same commit — pin both to `main`
  # so they cancel/queue instead of racing evergreen release uploads.
  group: apk-build-${{ (github.event.pull_request.merged && 'main') || github.event.pull_request.number || github.event.issue.number || (github.ref == 'refs/heads/main' && 'main') || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  gate:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      build_offline: ${{ steps.check.outputs.build_offline }}
      build_online: ${{ steps.check.outputs.build_online }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      head_ref: ${{ steps.check.outputs.head_ref }}
      push_release: ${{ steps.check.outputs.push_release }}
      trigger: ${{ steps.check.outputs.trigger }}
    steps:
      - name: Decide which product(s) to build (APK + iOS each)
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            // Unified phone: single label triggers Android + iOS.
            const BOTH_LABELS = new Set(['mobile']);
            const OFFLINE_LABELS = BOTH_LABELS;
            const ONLINE_LABELS = new Set(); // unused — Online/Offline chosen in-app

            const OFFLINE_PATH = [
              /^android\//,
              /^ios\//,
              /^capacitor\.config\.ts$/,
              /^capacitor\.cloud\.config\.ts$/,
              /^\.env\.service-mobile/,
              /^\.env\.service-cloud/,
              /^\.env\.service-phone/,
              /^src\/platforms\/service-mobile\//,
              /^src\/platforms\/service-cloud\//,
              /^src\/platforms\/mobileMode\.ts$/,
              /^src\/platforms\/PhoneModePicker\.tsx$/,
              /^scripts\/ci-build-(android|ios)\.sh$/,
              /^scripts\/ci-setup-android-sdk\.sh$/,
              /^scripts\/ci-upload-evergreen-asset\.sh$/,
              /^scripts\/android-set-product\.sh$/,
              /^scripts\/ios-set-product\.sh$/,
              /^scripts\/cap-sync-cloud\.sh$/,
            ];
            const ONLINE_PATH = []; // unused — unified shell only
            const SHARED_PATH = [
              /^package(-lock)?\.json$/,
              /^src\/App\.tsx$/,
              /^src\/main\.tsx$/,
              /^src\/index\.css$/,
              /^src\/lib\/(billTemplates|utils|billSettingsFlags|mobileAppShell)\.ts$/,
              /^src\/features\/invoices\//,
              /^src\/features\/settings\/SettingsView\.tsx$/,
              /^src\/components\/layout\/(LoginScreen|DownloadPage)\.tsx$/,
              /^src\/components\/ui\/(AppModal|ConfirmDialog|Toast|MobileShell)\.tsx$/,
              /^\.github\/workflows\/apk-build\.yml$/,
            ];

            const event = context.eventName;
            const actor = context.payload.sender?.login || '';
            const assoc = context.payload.comment?.author_association
              || context.payload.sender?.author_association
              || '';
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(assoc)
              || ['prathame'].includes(actor);

            const labelNames = (pr) =>
              (pr.labels || []).map((l) => String(l.name || '').toLowerCase());

            const productsFromLabels = (names) => {
              // Any mobile label → unified Android+iOS (build_offline jobs).
              const hit = names.some((n) => BOTH_LABELS.has(n) || OFFLINE_LABELS.has(n) || ONLINE_LABELS.has(n));
              return { offline: hit, online: false };
            };

            const productsFromFiles = (files) => {
              let offline = false;
              for (const f of files) {
                if (SHARED_PATH.some((r) => r.test(f))) offline = true;
                if (OFFLINE_PATH.some((r) => r.test(f))) offline = true;
              }
              return { offline, online: false };
            };

            const set = (opts = {}) => {
              // Unified phone only — former "online" Cap jobs are retired.
              const offline = !!(opts.offline || opts.online);
              const online = false;
              core.setOutput('build_offline', offline ? 'true' : 'false');
              core.setOutput('build_online', 'false');
              core.setOutput('pr_number', opts.pr || '');
              core.setOutput('head_sha', opts.sha || '');
              core.setOutput('head_ref', opts.ref || '');
              core.setOutput('push_release', opts.pushRelease ?? 'true');
              core.setOutput('trigger', opts.trigger || event);
              core.info(`APK gate: unified_phone=${offline} trigger=${opts.trigger || event}`);
            };

            // ── Merge to main → evergreen for labeled product(s) ───────────
            if (event === 'pull_request' && context.payload.action === 'closed') {
              const pr = context.payload.pull_request;
              if (!pr?.merged) {
                set({ offline: false, online: false });
                return;
              }
              const { offline, online } = productsFromLabels(labelNames(pr));
              if (!offline && !online) {
                core.info(
                  `PR #${pr.number} merged without offline/online/mobile label — skip APK ` +
                    `(path-filter push may still build the matching product).`,
                );
                set({ offline: false, online: false });
                return;
              }
              set({
                offline,
                online,
                pr: String(pr.number),
                sha: pr.merge_commit_sha || pr.head.sha,
                ref: 'main',
                pushRelease: 'true',
                trigger: 'merge-label',
              });
              return;
            }

            // ── Path-filtered push to main — only changed product(s) ───────
            if (event === 'push') {
              let files = [];
              const before = context.payload.before;
              const after = context.payload.after;
              if (before && after && !/^0+$/.test(before)) {
                try {
                  const { data } = await github.rest.repos.compareCommits({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    base: before,
                    head: after,
                  });
                  files = (data.files || []).map((f) => f.filename);
                } catch (e) {
                  core.warning(`compareCommits failed: ${e.message}; building both`);
                  files = ['package.json']; // shared → both
                }
              } else {
                files = ['package.json'];
              }
              const { offline, online } = productsFromFiles(files);
              set({
                offline,
                online,
                sha: context.sha,
                ref: context.ref,
                pushRelease: 'true',
                trigger: 'push-main-paths',
              });
              return;
            }

            // ── PR comment: preview only ───────────────────────────────────
            if (event === 'issue_comment') {
              const issue = context.payload.issue;
              if (!issue?.pull_request) {
                set({ offline: false, online: false });
                return;
              }
              const body = String(context.payload.comment?.body || '').toLowerCase();
              const hit = /\bapk[\s_-]*build\b/.test(body) || /(^|\s)\/apk(-build)?\b/.test(body);
              if (!hit) {
                set({ offline: false, online: false });
                return;
              }
              if (!allowed) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `⛔ @${actor} cannot trigger APK builds (need repo write access).`,
                });
                set({ offline: false, online: false });
                return;
              }
              // apk build offline | apk build online | apk build [both]
              let offline = true;
              let online = true;
              if (/\boffline\b/.test(body) && !/\bonline\b/.test(body) && !/\bboth\b/.test(body)) {
                offline = true;
                online = false;
              } else if (/\bonline\b/.test(body) && !/\boffline\b/.test(body) && !/\bboth\b/.test(body)) {
                offline = false;
                online = true;
              }
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issue.number,
              });
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes',
              });
              set({
                offline,
                online,
                pr: String(pr.number),
                sha: pr.head.sha,
                ref: pr.head.ref,
                pushRelease: 'false',
                trigger: 'pr-comment',
              });
              return;
            }

            // ── Label added on open PR: preview for that product ───────────
            if (event === 'pull_request' && context.payload.action === 'labeled') {
              const label = String(context.payload.label?.name || '').toLowerCase();
              const pr = context.payload.pull_request;
              if (pr.state === 'closed' && pr.merged) {
                set({ offline: false, online: false });
                return;
              }
              const { offline, online } = productsFromLabels([label]);
              if (!offline && !online) {
                set({ offline: false, online: false });
                return;
              }
              set({
                offline,
                online,
                pr: String(pr.number),
                sha: pr.head.sha,
                ref: pr.head.ref,
                pushRelease: 'false',
                trigger: 'pr-label-preview',
              });
              return;
            }

            if (event === 'workflow_dispatch') {
              const prNum = String(context.payload.inputs?.pr_number || '').trim();
              const push = String(context.payload.inputs?.push_release ?? 'true');
              const product = String(context.payload.inputs?.product || 'both');
              const offline = product === 'both' || product === 'offline';
              const online = product === 'both' || product === 'online';
              if (prNum) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(prNum),
                });
                set({
                  offline,
                  online,
                  pr: String(pr.number),
                  sha: pr.head.sha,
                  ref: pr.head.ref,
                  pushRelease: push,
                  trigger: 'dispatch',
                });
              } else {
                set({
                  offline,
                  online,
                  sha: context.sha,
                  ref: context.ref,
                  pushRelease: push,
                  trigger: 'dispatch',
                });
              }
              return;
            }

            set({ offline: false, online: false });

  build-apk:
    name: Build Dhandho Mobile APK
    needs: gate
    if: needs.gate.outputs.build_offline == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          # Capacitor CLI 8 requires Node >= 22
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Build unified phone debug APK
        env:
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
        run: |
          chmod +x scripts/ci-build-android.sh scripts/android-set-product.sh
          bash scripts/ci-build-android.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhandho-mobile-debug
          path: dist-apk/dhandho-mobile-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Push evergreen release asset
        if: needs.gate.outputs.push_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ci-upload-evergreen-asset.sh
          bash scripts/ci-upload-evergreen-asset.sh dhandho-mobile \
            dist-apk/dhandho-mobile-debug.apk \
            "Dhandho Mobile (evergreen)" \
            "Unified Android APK + iOS .app.zip. First launch picks Online or Offline once."

      - name: Comment on PR
        if: needs.gate.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = '${{ needs.gate.outputs.pr_number }}';
            const sha = '${{ needs.gate.outputs.head_sha }}'.slice(0, 7);
            const trigger = '${{ needs.gate.outputs.trigger }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const evergreen = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/releases/download/dhandho-mobile/dhandho-mobile-debug.apk`;
            const pushed = '${{ needs.gate.outputs.push_release }}' === 'true';
            const title = pushed
              ? '## ✅ Dhandho Mobile APK published (evergreen)'
              : '## ✅ Dhandho Mobile APK ready (PR preview)';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(pr),
              body: [
                title,
                ``,
                `| | |`,
                `|---|---|`,
                `| Trigger | \`${trigger}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Workflow | [run](${runUrl}) |`,
                `| Artifact | Actions → **Artifacts** → \`dhandho-mobile-debug\` |`,
                pushed
                  ? `| Evergreen | [${evergreen}](${evergreen}) |`
                  : `| Evergreen | not updated — add label \`mobile\` and merge to publish |`,
                `| Product | Unified Cap (\`in.dhandho.service\`) — Online/Offline one-time picker |`,
              ].join('\n'),
            });

  build-offline-ios:
    name: Build Dhandho Mobile iOS
    needs: gate
    if: needs.gate.outputs.build_offline == 'true'
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unified phone debug iOS
        env:
          VITE_API_ORIGIN: ${{ secrets.VITE_API_ORIGIN }}
          MOBILE_PRODUCT: phone
          IOS_BUILD_MODE: debug
        run: |
          chmod +x scripts/ci-build-ios.sh scripts/ios-set-product.sh
          bash scripts/ci-build-ios.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: dhandho-mobile-debug-ios
          path: dist-apk/dhandho-mobile-debug.app.zip
          if-no-files-found: error
          retention-days: 14

      - name: Push evergreen release asset
        if: needs.gate.outputs.push_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x scripts/ci-upload-evergreen-asset.sh
          bash scripts/ci-upload-evergreen-asset.sh dhandho-mobile \
            dist-apk/dhandho-mobile-debug.app.zip \
            "Dhandho Mobile (evergreen)" \
            "Unified Android APK + iOS .app.zip. First launch picks Online or Offline once."

      - name: Comment on PR
        if: needs.gate.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = '${{ needs.gate.outputs.pr_number }}';
            const sha = '${{ needs.gate.outputs.head_sha }}'.slice(0, 7);
            const trigger = '${{ needs.gate.outputs.trigger }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const evergreen = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/releases/download/dhandho-mobile/dhandho-mobile-debug.app.zip`;
            const pushed = '${{ needs.gate.outputs.push_release }}' === 'true';
            const title = pushed
              ? '## ✅ Dhandho Mobile iOS published (evergreen)'
              : '## ✅ Dhandho Mobile iOS ready (PR preview)';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(pr),
              body: [
                title,
                ``,
                `| | |`,
                `|---|---|`,
                `| Trigger | \`${trigger}\` |`,
                `| Commit | \`${sha}\` |`,
                `| Workflow | [run](${runUrl}) |`,
                `| Artifact | Actions → **Artifacts** → \`dhandho-mobile-debug-ios\` |`,
                pushed
                  ? `| Evergreen | [${evergreen}](${evergreen}) |`
                  : `| Evergreen | not updated — add label \`mobile\` and merge to publish |`,
                `| Product | Unified Cap iOS simulator (\`in.dhandho.service\`) — debug .app.zip |`,
              ].join('\n'),
            });
