# Offline Mobile debug APK — on-demand from a PR comment or label.
#
# Trigger (on a pull request):
#   Comment:  apk build
#   Comment:  /apk-build
#   Label:    apk-build
#   Or:       Actions → APK Build → Run workflow (optional PR number)
#
# Uploads evergreen release asset + PR artifact, then comments the download URL.
name: APK Build

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to build (leave empty for default branch tip)'
        required: false
      push_release:
        description: 'Upload to evergreen offline-mobile release'
        type: boolean
        default: true

concurrency:
  group: apk-build-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  gate:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
      pr_number: ${{ steps.check.outputs.pr_number }}
      head_sha: ${{ steps.check.outputs.head_sha }}
      head_ref: ${{ steps.check.outputs.head_ref }}
      push_release: ${{ steps.check.outputs.push_release }}
    steps:
      - name: Decide whether to build
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;
            const actor = context.payload.sender?.login || '';
            const assoc = context.payload.comment?.author_association
              || context.payload.sender?.author_association
              || '';
            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'].includes(assoc)
              || ['prathame'].includes(actor);

            const set = (should, pr, sha, ref, pushRelease = 'true') => {
              core.setOutput('should_run', should ? 'true' : 'false');
              core.setOutput('pr_number', pr || '');
              core.setOutput('head_sha', sha || '');
              core.setOutput('head_ref', ref || '');
              core.setOutput('push_release', pushRelease);
            };

            if (event === 'issue_comment') {
              const issue = context.payload.issue;
              if (!issue?.pull_request) {
                set(false);
                return;
              }
              const body = String(context.payload.comment?.body || '').toLowerCase();
              const hit = /\bapk[\s_-]*build\b/.test(body) || /(^|\s)\/apk(-build)?\b/.test(body);
              if (!hit) {
                set(false);
                return;
              }
              if (!allowed) {
                core.warning(`Ignoring apk build from ${actor} (${assoc})`);
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `⛔ @${actor} cannot trigger APK builds (need repo write access).`,
                });
                set(false);
                return;
              }
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issue.number,
              });
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes',
              });
              set(true, String(pr.number), pr.head.sha, pr.head.ref, 'true');
              return;
            }

            if (event === 'pull_request') {
              const label = String(context.payload.label?.name || '').toLowerCase();
              if (label !== 'apk-build' && label !== 'apk build') {
                set(false);
                return;
              }
              const pr = context.payload.pull_request;
              set(true, String(pr.number), pr.head.sha, pr.head.ref, 'true');
              return;
            }

            if (event === 'workflow_dispatch') {
              const prNum = String(context.payload.inputs?.pr_number || '').trim();
              const push = String(context.payload.inputs?.push_release ?? 'true');
              if (prNum) {
                const { data: pr } = await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: Number(prNum),
                });
                set(true, String(pr.number), pr.head.sha, pr.head.ref, push);
              } else {
                set(true, '', context.sha, context.ref, push);
              }
              return;
            }

            set(false);

  build-apk:
    name: Build Offline Mobile APK
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.gate.outputs.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Service Mobile env
        env:
          VITE_API_ORIGIN_SECRET: ${{ secrets.VITE_API_ORIGIN }}
        run: |
          cp .env.service-mobile.example .env.service-mobile
          if [ -n "$VITE_API_ORIGIN_SECRET" ]; then
            # Prefer repo secret when set (production API host for sideload builds)
            printf 'VITE_API_ORIGIN=%s\n' "$VITE_API_ORIGIN_SECRET" > .env.service-mobile.origin
            grep -v '^VITE_API_ORIGIN=' .env.service-mobile >> .env.service-mobile.origin || true
            mv .env.service-mobile.origin .env.service-mobile
            # Ensure other defaults still present
            grep -q '^VITE_DEPLOYMENT_MODE=' .env.service-mobile || echo 'VITE_DEPLOYMENT_MODE=service-mobile' >> .env.service-mobile
          fi
          echo "VITE_APP_VERSION=ci-${GITHUB_RUN_NUMBER}" >> .env.service-mobile
          echo "Env keys:"; cut -d= -f1 .env.service-mobile

      - name: Build web + Capacitor sync
        run: |
          npm run build:service-mobile
          npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: |
          mkdir -p dist-apk
          SRC=$(ls android/app/build/outputs/apk/debug/*.apk | head -1)
          cp "$SRC" dist-apk/offline-mobile-service-debug.apk
          ls -lh dist-apk/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: offline-mobile-service-debug
          path: dist-apk/offline-mobile-service-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Push evergreen release asset
        if: needs.gate.outputs.push_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view offline-mobile >/dev/null 2>&1 || \
            gh release create offline-mobile --title "Offline Mobile (evergreen APK)" --notes "Sideload testing APK — overwritten by CI apk-build runs."
          gh release upload offline-mobile dist-apk/offline-mobile-service-debug.apk --clobber

      - name: Comment on PR
        if: needs.gate.outputs.pr_number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const pr = '${{ needs.gate.outputs.pr_number }}';
            const sha = '${{ needs.gate.outputs.head_sha }}'.slice(0, 7);
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const evergreen = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/releases/download/offline-mobile/offline-mobile-service-debug.apk`;
            const pushed = '${{ needs.gate.outputs.push_release }}' === 'true';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(pr),
              body: [
                `## ✅ Offline Mobile APK ready`,
                ``,
                `| | |`,
                `|---|---|`,
                `| Commit | \`${sha}\` |`,
                `| Workflow | [run](${runUrl}) |`,
                pushed ? `| Evergreen download | [${evergreen}](${evergreen}) |` : `| Evergreen | skipped |`,
                `| Artifact | See workflow **Artifacts** → \`offline-mobile-service-debug\` |`,
                ``,
                `_Triggered by \`apk build\` comment / \`apk-build\` label_`,
              ].join('\n'),
            });
