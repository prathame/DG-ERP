name: Lint & Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check for console.log in production code (warning only)
        run: |
          echo "Checking for debug console.log statements..."
          grep -rn 'console.log' src/ --include='*.tsx' --include='*.ts' | grep -v 'node_modules' | grep -v '.test.' || echo "Clean — no console.log in frontend"
