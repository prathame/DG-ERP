<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dhandho — Offline</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#151619;color:white;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;}
    .icon{width:80px;height:80px;background:#F27D26;border-radius:20px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:28px;margin:0 auto 24px;}
    h1{font-size:24px;margin-bottom:8px;}
    p{color:#9ca3af;font-size:14px;margin-bottom:24px;}
    button{padding:12px 32px;background:#F27D26;color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;}
    button:hover{background:#D96A1C;}
  </style>
</head>
<body>
  <div>
    <div class="icon">DH</div>
    <h1>You're Offline</h1>
    <p>Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
